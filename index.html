<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="tituloSitio">Ludopoiesis - Oráculo Para Jugar la Vida</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dosis&display=swap" rel="stylesheet">
</head>
  
<body onload="cargarIntro()">
<div class="contenedor-principal">
  <h1 id="titulo-home" onclick="cargarIntro()">Ludopoiesis</h1>

    <div id="carta-container"></div>
  <div id="introShort" class="intro-texto" style="display: none;"></div>
  <div id="introLong" class="intro-texto" style="display: none;"> 
    <span class="more-button" onclick="mostrarAutor()" data-i18n="sobreAutor">➤ Sobre el autor</span>
  </div>
  <div id="dinamica" class="intro-texto" style="display: none;"></div>
</div>
<div id="overlay-ampliada"></div>

  
<div class="zona-controles">
  <div class="botones-controles">
    <button onclick="lanzarCartaSuperpuesta()" data-i18n="btnCarta">Carta</button>
    <button onclick="reiniciarCartas()" data-i18n="btnNuevo">Nuevo</button>
  </div>
  <div id="lentes-toggle">
      <div class="lente-horizontal" onclick="toggleLente('naturaleza')">
        <img id="btn-naturaleza" src="img/iconos/icono_naturaleza.png" alt="Naturaleza">
      </div>
      <div class="lente-horizontal" onclick="toggleLente('fluir')">
        <img id="btn-fluir" src="img/iconos/icono_fluir.png" alt="Fluir">
      </div>
      <div class="lente-horizontal" onclick="toggleLente('tecnologia')">
        <img id="btn-tecnologia" src="img/iconos/icono_tecnologia.png" alt="Tecnología">
      </div>
    </div>
  
  <div id="instrucciones">
    <div class="paso">
      <h2>
        <span data-i18n="paso1">1. Haz una pregunta</span>
        <i class="fa fa-info-circle" onclick="mostrarPregunta()" data-i18n-title="tooltipPregunta" title="¿Cómo se hace una buena pregunta?"></i>
      </h2>
    </div>

    <div class="paso">
      <h2>
        <span data-i18n="paso2">2. Escoge tus lentes</span>
        <i class="fa fa-info-circle" onclick="mostrarLentes()" data-i18n-title="tooltipLentes" title="Ver más sobre los lentes"></i>
      </h2>
    </div>

  
    <div class="paso">
      <h2><span data-i18n="paso3">3. Tira una carta</span></h2>
    
    </div>


    <div class="idioma-switch">
      <span class="bandera bandera-activa" id="flag-es" onclick="setIdioma('es')" title="Español">🇪🇸</span>
      <span class="bandera" id="flag-pt" onclick="setIdioma('pt')" title="Português">🇧🇷</span>
      <span class="bandera" id="flag-en" onclick="setIdioma('en')" title="English">🇬🇧</span>
    </div>

    
    
  </div>

<script src="script.js"></script>
</body>
</html>
